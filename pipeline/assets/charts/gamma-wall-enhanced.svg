<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: auto;">
  <defs>
    <!-- Gradient for regular bars -->
    <linearGradient id="gammaRegular" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e5d5b7;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#C8A85A;stop-opacity:0.3" />
    </linearGradient>
    
    <!-- Gradient for put wall -->
    <linearGradient id="gammaPutWall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fca5a5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#dc2626;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:0.8" />
    </linearGradient>
    
    <!-- Gradient for call wall -->
    <linearGradient id="gammaCallWall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#86efac;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16a34a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:0.8" />
    </linearGradient>
    
    <!-- Glow for walls -->
    <filter id="wallGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Shadow for bars -->
    <filter id="gammaShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background grid -->
  <g opacity="0.15">
    <line x1="50" y1="50" x2="850" y2="50" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="50" y1="100" x2="850" y2="100" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="50" y1="150" x2="850" y2="150" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="50" y1="200" x2="850" y2="200" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="2,2"/>
  </g>
  
  <!-- Baseline -->
  <line x1="50" y1="250" x2="850" y2="250" stroke="#374151" stroke-width="2"/>
  
  <!-- Bar 1: $55 (18M) -->
  <g filter="url(#gammaShadow)">
    <rect x="80" y="170" width="50" height="80" rx="4" ry="4" fill="url(#gammaRegular)"/>
  </g>
  <text x="105" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#92400e">18M</text>
  <text x="105" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#6b7280">$55</text>
  
  <!-- Bar 2: $57 (28M) -->
  <g filter="url(#gammaShadow)">
    <rect x="150" y="130" width="50" height="120" rx="4" ry="4" fill="url(#gammaRegular)"/>
  </g>
  <text x="175" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#92400e">28M</text>
  <text x="175" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#6b7280">$57</text>
  
  <!-- Bar 3: $60 (42M) - PUT WALL -->
  <g filter="url(#wallGlow)">
    <rect x="220" y="50" width="50" height="200" rx="4" ry="4" fill="url(#gammaPutWall)" stroke="#dc2626" stroke-width="2"/>
    <!-- Wall indicator line extending upward -->
    <line x1="245" y1="50" x2="245" y2="20" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
    <path d="M 235,25 L 245,15 L 255,25" fill="none" stroke="#dc2626" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="245" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#dc2626">42M</text>
  <text x="245" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#dc2626">$60</text>
  <text x="245" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#dc2626">PUT WALL</text>
  
  <!-- Bar 4: $63 (32M) -->
  <g filter="url(#gammaShadow)">
    <rect x="290" y="100" width="50" height="150" rx="4" ry="4" fill="url(#gammaRegular)"/>
  </g>
  <text x="315" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#92400e">32M</text>
  <text x="315" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#6b7280">$63</text>
  
  <!-- Bar 5: $64 (22M) -->
  <g filter="url(#gammaShadow)">
    <rect x="360" y="150" width="50" height="100" rx="4" ry="4" fill="url(#gammaRegular)"/>
  </g>
  <text x="385" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#92400e">22M</text>
  <text x="385" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#6b7280">$64</text>
  
  <!-- Bar 6: $65 (20M) - CURRENT PRICE -->
  <g filter="url(#gammaShadow)">
    <rect x="430" y="160" width="50" height="90" rx="4" ry="4" fill="url(#gammaRegular)" stroke="#0F3D2E" stroke-width="2"/>
    <!-- Current price indicator -->
    <circle cx="455" cy="160" r="10" fill="#0F3D2E" stroke="white" stroke-width="2"/>
    <text x="455" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="white">★</text>
  </g>
  <text x="455" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#92400e">20M</text>
  <text x="455" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#0F3D2E">$65</text>
  <text x="455" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#0F3D2E">CURRENT</text>
  
  <!-- Bar 7: $67 (24M) -->
  <g filter="url(#gammaShadow)">
    <rect x="500" y="140" width="50" height="110" rx="4" ry="4" fill="url(#gammaRegular)"/>
  </g>
  <text x="525" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#92400e">24M</text>
  <text x="525" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#6b7280">$67</text>
  
  <!-- Bar 8: $69 (31M) -->
  <g filter="url(#gammaShadow)">
    <rect x="570" y="100" width="50" height="150" rx="4" ry="4" fill="url(#gammaRegular)"/>
  </g>
  <text x="595" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#92400e">31M</text>
  <text x="595" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#6b7280">$69</text>
  
  <!-- Bar 9: $70 (40M) - CALL WALL -->
  <g filter="url(#wallGlow)">
    <rect x="640" y="55" width="50" height="195" rx="4" ry="4" fill="url(#gammaCallWall)" stroke="#16a34a" stroke-width="2"/>
    <!-- Wall indicator line extending upward -->
    <line x1="665" y1="55" x2="665" y2="20" stroke="#16a34a" stroke-width="3" stroke-linecap="round"/>
    <path d="M 655,25 L 665,15 L 675,25" fill="none" stroke="#16a34a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="665" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#16a34a">40M</text>
  <text x="665" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#16a34a">$70</text>
  <text x="665" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#16a34a">CALL WALL</text>
  
  <!-- Bar 10: $74 (26M) -->
  <g filter="url(#gammaShadow)">
    <rect x="710" y="130" width="50" height="120" rx="4" ry="4" fill="url(#gammaRegular)"/>
  </g>
  <text x="735" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#92400e">26M</text>
  <text x="735" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#6b7280">$74</text>
  
  <!-- Bar 11: $77 (19M) -->
  <g filter="url(#gammaShadow)">
    <rect x="780" y="170" width="50" height="80" rx="4" ry="4" fill="url(#gammaRegular)"/>
  </g>
  <text x="805" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#92400e">19M</text>
  <text x="805" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#6b7280">$77</text>
</svg>

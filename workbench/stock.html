  <style>

<body>
  <div id="nav-placeholder"></div>
  <script src="load-nav.js" defer></script>
  <div class="container">

    <div id="loadingOverlay" class="loading-overlay">
      <div class="spinner"></div>
      <div class="loading-text">Loading Analysis…</div>
    </div>

    <div id="stockHeader" style="display:none"></div>
    <div id="contentGrid" style="display:none"></div>

    <footer>
      NewLeaf System — AI-Powered Options Analysis | Not Financial Advice
    </footer>
  </div>

  <script>
  'use strict';

  const R2 = window.R2;
  const G = id => document.getElementById(id);
  const fmt = (n, d = 2) => n?.toFixed?.(d) ?? '—';
  const fmtPct = (n, d = 1) => n != null ? fmt(n, d) + '%' : '—';
  const fmtP = n => n != null ? '$' + fmt(n, 2) : '—';
  const fmtDate = s => { const d = new Date(s); return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); };

  let charts = {};
  let atmContracts = null;
  let requestedStrategy = null; // normalized strategy code from ?strategy= URL param

  // Map any external strategy code (engine bucket / scanner shorthand) to a stock
  // strategy code (must match the codes in generateAlternativeStrategies + builder presets).
  // calendar_spread / cash_secured_put / wheel don't have inline 4-leg renderers
  // here — they hit the fallback hero (line ~1062) which routes to strategy-builder.
  const STRATEGY_CODES = new Set([
    'iron_butterfly', 'iron_condor',
    'bull_put_spread', 'bear_call_spread',
    'bull_call_spread', 'bear_put_spread',
    'broken_wing_put', 'broken_wing_call',
    'calendar_spread', 'cash_secured_put', 'wheel'
  ]);
  function normalizeStrategyCode(raw) {
    if (!raw) return null;
    // Lowercase, treat any run of non-alphanumerics (spaces, hyphens, etc.) as `_`.
    const k = String(raw).trim().toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
    if (STRATEGY_CODES.has(k)) return k;
    const aliases = {
      iron_condor: 'iron_condor',
      iron_butterfly: 'iron_butterfly',
      bull_put: 'bull_put_spread', bullput: 'bull_put_spread',
      bear_call: 'bear_call_spread', bearcall: 'bear_call_spread',
      bull_call: 'bull_call_spread', bullcall: 'bull_call_spread',
      bear_put: 'bear_put_spread', bearput: 'bear_put_spread',
      broken_wing: 'broken_wing_put', brokenwing: 'broken_wing_put',
      broken_wing_butterfly: 'broken_wing_put', bwb: 'broken_wing_put',
      bwb_put: 'broken_wing_put', bwb_call: 'broken_wing_call',
      // Real codes for csp/wheel/calendar — previously stubbed to spreads,
      // which made stock render the wrong strategy in the hero panel.
      csp: 'cash_secured_put',
      cash_secured_puts: 'cash_secured_put',
      sell_put: 'cash_secured_put', sell_puts: 'cash_secured_put',
      the_wheel: 'wheel',
      calendar: 'calendar_spread'
    };
    return aliases[k] || null;
  }
  const STRATEGY_LABELS = {
    iron_butterfly:   'Iron Butterfly',
    iron_condor:      'Iron Condor',
    bull_put_spread:  'Bull Put Spread',
    bear_call_spread: 'Bear Call Spread',
    bull_call_spread: 'Bull Call Spread',
    bear_put_spread:  'Bear Put Spread',
    broken_wing_put:  'Broken Wing Butterfly (Put)',
    broken_wing_call: 'Broken Wing Butterfly (Call)',
    calendar_spread:  'Calendar Spread',
    cash_secured_put: 'Cash-Secured Put',
    wheel:            'The Wheel'
  };
  const STRATEGY_ICONS = {
    iron_butterfly: '🦋', iron_condor: '🦅',
    bull_put_spread: '📈', bear_call_spread: '📉',
    bull_call_spread: '🚀', bear_put_spread: '⬇️',
    broken_wing_put: '🦗', broken_wing_call: '🦗',
    calendar_spread: '📅', cash_secured_put: '📉', wheel: '♻'
  };

  function initTabs() {
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const targetTab = btn.dataset.tab;
        tabBtns.forEach(b => b.classList.remove('active'));
        tabContents.forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(targetTab).classList.add('active');
      });
    });
  }

  let companyMetadata = {};

  window.addEventListener('DOMContentLoaded', async () => {
    // Load company metadata first
    try {
      const metaRes = await fetch(R2 + '/reports/company-metadata.json?_=' + Date.now());
      if (metaRes.ok) {
        companyMetadata = await metaRes.json();
      }
    } catch(e) {
      console.warn('Could not load company metadata:', e);
    }

    const p = new URLSearchParams(location.search);
    const symbol = (p.get('symbol') || 'SPY').toUpperCase();
    const date = p.get('date') || 'latest';
    requestedStrategy = normalizeStrategyCode(p.get('strategy'));
    document.title = symbol + ' Analysis · NewLeaf System';
    G('pageTitle').textContent = document.title;
    await loadReport(symbol, date);
  });

  async function loadReport(symbol, date) {
    G('loadingOverlay').style.display = 'flex';
    try {
      const url = date === 'latest'
        ? R2 + '/reports/' + symbol + '/latest.json?_=' + Date.now()
        : R2 + '/reports/' + symbol + '/' + date + '.json?_=' + Date.now();

      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const report = await res.json();

      // If loading latest.json, also load today's daily snapshot for OI-rich gamma data
      if (date === 'latest') {
        try {
          const today = new Date().toISOString().slice(0, 10);
          const dailyUrl = R2 + '/reports/' + symbol + '/' + today + '.json?_=' + Date.now();
          const dailyRes = await fetch(dailyUrl);
          if (dailyRes.ok) {
            const dailyReport = await dailyRes.json();
            // Merge gamma data from daily snapshot (has OI data)
            if (dailyReport.gammaData && dailyReport.gammaData.analysis) {
              report.gammaData = dailyReport.gammaData;
            }
          }
        } catch (err) {
          console.warn('Daily snapshot not available for gamma analysis:', err);
        }
      }

      try {
        const atmUrl = R2 + '/reports/' + symbol + '/contracts/atm-latest.json?_=' + Date.now();
        const atmRes = await fetch(atmUrl);
        if (atmRes.ok) {
          atmContracts = await atmRes.json();
        }
      } catch (err) {
        console.warn('ATM contracts not available:', err);
      }

      render(report);
    } catch (err) {
      G('loadingOverlay').style.display = 'none';
      await window.NewLeafModal?.showError({
        title: 'Report unavailable',
        message: 'Error loading report: ' + err.message
      });
    }
  }

  function render(report) {
    window.stockData = report;

  function calculateStrategyLegs(symbol, spot, strategyCode, gammaData) {
    if (!atmContracts || !atmContracts.expiries || !atmContracts.expiries.length) {
      return null;
    }

    const expiry = atmContracts.expiries[0];
    const strikes = [...new Set(expiry.contracts.map(c => c.strike))].sort((a, b) => a - b);
    const atmIndex = strikes.findIndex(s => s >= spot);

    let longPutIndex, shortPutIndex, shortCallIndex, longCallIndex;

    if (strategyCode === 'iron_condor') {
      longPutIndex = Math.max(0, atmIndex - 5);
      shortPutIndex = Math.max(0, atmIndex - 2);
      shortCallIndex = Math.min(strikes.length - 1, atmIndex + 2);
      longCallIndex = Math.min(strikes.length - 1, atmIndex + 5);
    } else if (strategyCode === 'iron_butterfly') {
      longPutIndex = Math.max(0, atmIndex - 3);
      shortPutIndex = atmIndex;
      shortCallIndex = atmIndex;
      longCallIndex = Math.min(strikes.length - 1, atmIndex + 3);
    } else if (strategyCode === 'bull_put_spread') {
      // Put credit spread: collapse call side at ATM so the iron-condor math returns
      // pure put-side credit.
      longPutIndex = Math.max(0, atmIndex - 5);
      shortPutIndex = Math.max(0, atmIndex - 1);
      shortCallIndex = atmIndex;
      longCallIndex = atmIndex;
    } else if (strategyCode === 'bear_call_spread') {
      longPutIndex = atmIndex;
      shortPutIndex = atmIndex;
      shortCallIndex = Math.min(strikes.length - 1, atmIndex + 1);
      longCallIndex = Math.min(strikes.length - 1, atmIndex + 5);
    } else if (strategyCode === 'bull_call_spread' || strategyCode === 'bear_put_spread' ||
               strategyCode === 'broken_wing_put' || strategyCode === 'broken_wing_call') {
      // Debit verticals + BWB: the iron-condor credit/maxLoss math at the bottom of
      // this function doesn't fit. Skip leg-level preview here — the simple hero +
      // strategy-builder will render the proper P/L curve.
      return null;
    } else {
      longPutIndex = Math.max(0, atmIndex - 5);
      shortPutIndex = Math.max(0, atmIndex - 1);
      shortCallIndex = Math.min(strikes.length - 1, atmIndex + 1);
      longCallIndex = Math.min(strikes.length - 1, atmIndex + 5);
    }

    const legs = {
      longPut: strikes[longPutIndex],
      shortPut: strikes[shortPutIndex],
      shortCall: strikes[shortCallIndex],
      longCall: strikes[longCallIndex]
    };

    const contracts = {
      longPut: expiry.contracts.find(c => c.strike === legs.longPut && c.type === 'put'),
      shortPut: expiry.contracts.find(c => c.strike === legs.shortPut && c.type === 'put'),
      shortCall: expiry.contracts.find(c => c.strike === legs.shortCall && c.type === 'call'),
      longCall: expiry.contracts.find(c => c.strike === legs.longCall && c.type === 'call')
    };

    if (!contracts.longPut || !contracts.shortPut || !contracts.shortCall || !contracts.longCall) {
      return null;
    }

    const credit = (contracts.shortPut.mid - contracts.longPut.mid) + (contracts.shortCall.mid - contracts.longCall.mid);
    const maxProfit = credit * 100;
    const maxLoss = Math.max(
      (legs.shortPut - legs.longPut) * 100 - maxProfit,
      (legs.longCall - legs.shortCall) * 100 - maxProfit
    );

    const breakeven1 = legs.shortPut - credit;
    const breakeven2 = legs.shortCall + credit;

    return {
      expiry: expiry.expiry,
      dte: expiry.dte,
      legs: legs,
      contracts: contracts,
      netCredit: credit * 100,
      maxProfit: maxProfit,
      maxLoss: Math.abs(maxLoss),
      breakeven1: breakeven1,
      breakeven2: breakeven2
    };
  }

  function generateAlternativeStrategies(meta, snap, scoring, gammaData) {
    const strategies = [];
    
    const strategyTypes = [
      { code: 'iron_butterfly', name: 'Iron Butterfly', icon: '🦋' },
      { code: 'iron_condor', name: 'Iron Condor', icon: '🦅' },
      { code: 'bull_put_spread', name: 'Bull Put Spread', icon: '📈' },
      { code: 'bear_call_spread', name: 'Bear Call Spread', icon: '📉' }
    ];
    
    strategyTypes.forEach(st => {
      if (st.code === scoring.strategy.code) return;
      
      const stratData = calculateStrategyLegs(meta.symbol, snap.price, st.code, gammaData);
      if (!stratData) return;
      
      let reason = '';
      if (st.code === 'iron_condor') {
        reason = 'Wider profit zone than butterfly, lower max profit but higher probability of success.';
      } else if (st.code === 'iron_butterfly') {
        reason = 'Tighter profit zone, higher credit collected at center strike.';
      } else if (st.code === 'bull_put_spread') {
        reason = 'Bullish bias, collect premium on put side only.';
      } else if (st.code === 'bear_call_spread') {
        reason = 'Bearish bias, collect premium on call side only.';
      }
      
      strategies.push({
        ...st,
        ...stratData,
        reason: reason
      });
    });
    
    return strategies;
  }

        </div>
        <p style="padding: 0 0 16px 0; color: #666; font-size: 14px;">
          Based on current market conditions, here are alternative strategies to consider:
        </p>
        <div class="strategy-comparison">
          ${cardsHTML}
        </div>
      </div>
    `;
  }

  function renderCharts(snap, gammaData, techData) {
    renderGammaChart(snap.price, gammaData);
    renderPriceChart(snap.price, techData);
  }

  function renderGammaChart(spot, gammaData) {
    const top = gammaData.analysis.topStrikes || [];
    const sorted = [...top].sort((a, b) => a.strike - b.strike);
    const categories = sorted.map(s => '$' + s.strike);

    if (!G('gammaChart')) return;
    if (charts.gamma) charts.gamma.destroy();

    const hasGex = sorted.some(s => Math.abs(s.gamma_exposure) > 0);
    const hasOI = sorted.some(s => (s.call_oi + s.put_oi) > 0);

    if (hasGex) {
      const vals = sorted.map(s => s.gamma_exposure);
      charts.gamma = Highcharts.chart('gammaChart', {
        chart: {
          type: 'column',
          backgroundColor: '#ffffff',
          style: { fontFamily: 'Space Mono, monospace' }
        },
        title: { text: null },
        credits: { enabled: false },
        xAxis: {
          categories: categories,
          title: { text: 'Strike Price', style: { color: '#64748b', fontSize: '10px' } },
          labels: { style: { color: '#64748b', fontSize: '10px' } }
        },
        yAxis: {
          title: { text: 'Net Gamma Exposure', style: { color: '#64748b', fontSize: '10px' } },
          labels: { style: { color: '#64748b', fontSize: '10px' } },
          gridLineColor: 'rgba(0,0,0,0.05)'
        },
        legend: { enabled: false },
        plotOptions: {
          column: {
            borderWidth: 1,
            colorByPoint: true,
            colors: vals.map(v => v >= 0 ? '#4ade80' : '#ef4444')
          }
        },
        series: [{
          name: 'Net Gamma Exposure',
          data: vals.map((v, i) => ({
            y: v,
            color: v >= 0 ? 'rgba(74, 222, 128, 0.6)' : 'rgba(239, 68, 68, 0.6)',
            borderColor: v >= 0 ? '#4ade80' : '#ef4444'
          }))
        }]
      });
    } else if (hasOI) {
      const callOI = sorted.map(s => s.call_oi || 0);
      const putOI = sorted.map(s => -(s.put_oi || 0));
      charts.gamma = Highcharts.chart('gammaChart', {
        chart: {
          type: 'column',
          backgroundColor: '#ffffff',
          style: { fontFamily: 'Space Mono, monospace' }
        },
        title: { text: null },
        credits: { enabled: false },
        xAxis: {
          categories: categories,
          title: { text: 'Strike Price', style: { color: '#64748b', fontSize: '10px' } },
          labels: { style: { color: '#64748b', fontSize: '10px' } }
        },
        yAxis: {
          title: { text: 'Open Interest', style: { color: '#64748b', fontSize: '10px' } },
          labels: { style: { color: '#64748b', fontSize: '10px' } },
          gridLineColor: 'rgba(0,0,0,0.05)'
        },
        legend: {
          enabled: true,
          itemStyle: { fontSize: '10px', color: '#64748b' }
        },
        plotOptions: {
          column: { borderWidth: 1 }
        },
        series: [
          {
            name: 'Call OI',
            data: callOI,
            color: 'rgba(74, 222, 128, 0.6)',
            borderColor: '#4ade80'
          },
          {
            name: 'Put OI',
            data: putOI,
            color: 'rgba(239, 68, 68, 0.6)',
            borderColor: '#ef4444'
          }
        ]
      });
    } else {
      // No gamma or OI data available - show message
      G('gammaChart').innerHTML = `
        <div style="display:flex;align-items:center;justify-content:center;height:100%;color:#64748b;font-size:0.75rem;text-align:center;padding:2rem;">
          <div>
            <div style="font-size:2rem;margin-bottom:0.5rem">📊</div>
            <div style="margin-bottom:0.5rem">Gamma wall chart not available</div>
            <div style="font-size:0.65rem;line-height:1.6">
              Open interest data is required to generate the gamma wall visualization.<br>
              Put wall and call wall values are shown above.
            </div>
          </div>
        </div>
      `;
    }
  }

  function renderPriceChart(spot, td) {
    const { priceHistory, bbSeries } = td;
    if (!priceHistory?.length) return;

    if (!G('priceChart')) return;
    if (charts.price) charts.price.destroy();

    const bbMap = new Map((bbSeries || []).map(b => [fmtDate(b.t), b]));

    // Convert to Highcharts data format (timestamp, value)
    const priceData = priceHistory.map(b => [new Date(b.t).getTime(), b.c]);
    const upperData = priceHistory.map(b => {
      const bb = bbMap.get(fmtDate(b.t));
      return [new Date(b.t).getTime(), bb?.upper ?? null];
    });
    const middleData = priceHistory.map(b => {
      const bb = bbMap.get(fmtDate(b.t));
      return [new Date(b.t).getTime(), bb?.middle ?? null];
    });
    const lowerData = priceHistory.map(b => {
      const bb = bbMap.get(fmtDate(b.t));
      return [new Date(b.t).getTime(), bb?.lower ?? null];
    });

    charts.price = Highcharts.chart('priceChart', {
      chart: {
        backgroundColor: '#ffffff',
        style: { fontFamily: 'Space Mono, monospace' }
      },
      title: { text: null },
      credits: { enabled: false },
      xAxis: {
        type: 'datetime',
        title: { text: 'Date', style: { color: '#64748b', fontSize: '10px' } },
        labels: {
          style: { color: '#64748b', fontSize: '10px' },
          rotation: -45
        },
        gridLineColor: 'rgba(0,0,0,0.05)'
      },
      yAxis: {
        title: { text: 'Price ($)', style: { color: '#64748b', fontSize: '10px' } },
        labels: { style: { color: '#64748b', fontSize: '10px' } },
        gridLineColor: 'rgba(0,0,0,0.05)'
      },
      legend: {
        enabled: true,
        itemStyle: { fontSize: '10px', color: '#64748b' }
      },
      tooltip: {
        shared: true,
        crosshairs: true,
        valueDecimals: 2,
        valuePrefix: '$'
      },
      series: [
        {
          type: 'line',
          name: 'Price',
          data: priceData,
          color: '#1a1a1a',
          lineWidth: 2,
          marker: { enabled: false }
        },
        {
          type: 'line',
          name: 'Upper BB',
          data: upperData,
          color: 'rgba(201,169,110,0.4)',
          lineWidth: 1,
          dashStyle: 'Dash',
          marker: { enabled: false }
        },
        {
          type: 'line',
          name: 'Middle BB',
          data: middleData,
          color: 'rgba(201,169,110,0.7)',
          lineWidth: 1,
          marker: { enabled: false }
        },
        {
          type: 'line',
          name: 'Lower BB',
          data: lowerData,
          color: 'rgba(201,169,110,0.4)',
          lineWidth: 1,
          dashStyle: 'Dash',
          marker: { enabled: false }
        }
      ]
    });
  }

  // Historical IV Chart
  async function loadAndRenderIVHistory(symbol) {
    try {
      const url = R2 + '/reports/' + symbol + '/history/iv.json?_=' + Date.now();
      const res = await fetch(url);
      if (!res.ok) {
        console.warn('IV history not available');
        return;
      }
      const ivHistory = await res.json();

      if (!ivHistory || ivHistory.length === 0) {
        console.warn('No IV history data');
        return;
      }

      // Sort by date
      ivHistory.sort((a, b) => new Date(a.date) - new Date(b.date));

      const data = ivHistory.map(d => [new Date(d.date).getTime(), d.atmIv]);

      Highcharts.chart('ivHistoryChart', {
        chart: {
          backgroundColor: '#ffffff',
          style: { fontFamily: 'Space Mono, monospace' }
        },
        title: { text: null },
        credits: { enabled: false },
        xAxis: {
          type: 'datetime',
          title: { text: 'Date', style: { color: '#64748b' } },
          labels: { style: { color: '#64748b' } }
        },
        yAxis: {
          title: { text: 'ATM IV (%)', style: { color: '#64748b' } },
          labels: {
            style: { color: '#64748b' },
            formatter: function() { return this.value.toFixed(1); }
          }
        },
        tooltip: {
          xDateFormat: '%Y-%m-%d',
          valueSuffix: '%',
          valueDecimals: 2
        },
        series: [{
          type: 'line',
          name: 'ATM IV',
          data: data,
          color: '#4caf85',
          lineWidth: 2,
          marker: { radius: 4 }
        }]
      });
    } catch (err) {
      console.error('Failed to load IV history:', err);
    }
  }

  // Historical Premium Chart
  async function loadAndRenderPremiumHistory(symbol) {
    try {
      const url = R2 + '/reports/' + symbol + '/history/premium.json?_=' + Date.now();
      const res = await fetch(url);
      if (!res.ok) {
        console.warn('Premium history not available');
        return;
      }
      const premiumHistory = await res.json();

      if (!premiumHistory || premiumHistory.length === 0) {
        console.warn('No premium history data');
        return;
      }

      // Sort by date
      premiumHistory.sort((a, b) => new Date(a.date) - new Date(b.date));

      // Separate weekly and monthly
      const weeklyData = premiumHistory.filter(d => d.expiryType === 'weekly');
      const monthlyData = premiumHistory.filter(d => d.expiryType === 'monthly');

      const weeklyCallPct = weeklyData.map(d => [new Date(d.date).getTime(), d.callPct]);
      const weeklyPutPct = weeklyData.map(d => [new Date(d.date).getTime(), d.putPct]);
      const monthlyCallPct = monthlyData.map(d => [new Date(d.date).getTime(), d.callPct]);
      const monthlyPutPct = monthlyData.map(d => [new Date(d.date).getTime(), d.putPct]);

      Highcharts.chart('premiumHistoryChart', {
        chart: {
          backgroundColor: '#ffffff',
          style: { fontFamily: 'Space Mono, monospace' }
        },
        title: { text: null },
        credits: { enabled: false },
        xAxis: {
          type: 'datetime',
          title: { text: 'Date', style: { color: '#64748b' } },
          labels: { style: { color: '#64748b' } }
        },
        yAxis: {
          title: { text: 'Premium (%)', style: { color: '#64748b' } },
          labels: {
            style: { color: '#64748b' },
            formatter: function() { return this.value.toFixed(2) + '%'; }
          }
        },
        tooltip: {
          xDateFormat: '%Y-%m-%d',
          valueSuffix: '%',
          valueDecimals: 2,
          shared: true
        },
        series: [
          {
            type: 'line',
            name: 'Weekly Call',
            data: weeklyCallPct,
            color: '#4caf85',
            lineWidth: 2,
            dashStyle: 'Solid',
            marker: { radius: 4, symbol: 'circle' }
          },
          {
            type: 'line',
            name: 'Weekly Put',
            data: weeklyPutPct,
            color: '#4caf85',
            lineWidth: 2,
            dashStyle: 'Dash',
            marker: { radius: 4, symbol: 'square' }
          },
          {
            type: 'line',
            name: 'Monthly Call',
            data: monthlyCallPct,
            color: '#C9A96E',
            lineWidth: 2,
            dashStyle: 'Solid',
            marker: { radius: 4, symbol: 'circle' }
          },
          {
            type: 'line',
            name: 'Monthly Put',
            data: monthlyPutPct,
            color: '#C9A96E',
            lineWidth: 2,
            dashStyle: 'Dash',
            marker: { radius: 4, symbol: 'square' }
          }
        ]
      });
    } catch (err) {
      console.error('Failed to load premium history:', err);
    }
  }

  </script>
</body>

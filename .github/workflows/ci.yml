name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install root dependencies
        run: npm ci

      - name: Install scanner dependencies
        run: npm ci --prefix scanner

      - name: Check shell scripts
        run: bash -n scripts/*.sh scripts/scanner/*.sh scanner/yahoo-svc/start.sh

      - name: Check JavaScript syntax
        run: |
          set -euo pipefail
          git ls-files '*.js' '*.cjs' '*.mjs' \
            ':!:node_modules/**' \
            ':!:dist/**' \
            ':!:pipeline/output/**' \
            | xargs -r -n 1 node --check

      - name: Check Python syntax
        run: |
          set -euo pipefail
          python -m py_compile $(git ls-files '*.py' ':!:node_modules/**' ':!:dist/**' ':!:pipeline/output/**')

      - name: Scan for sensitive commit candidates
        run: node scripts/scan-sensitive-candidates.cjs --all

      - name: Build web app
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_ADMIN_EMAILS: ${{ vars.VITE_ADMIN_EMAILS }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_SCHEDULER_API: ${{ vars.VITE_SCHEDULER_API }}
        run: npm run build
